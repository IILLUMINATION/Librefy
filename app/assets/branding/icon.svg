<?xml version="1.0" encoding="UTF-8"?>
<!--
  Librefy app icon.
  Brand mark: musical note carrying a stream / wave underline,
  set on the Material-3 seed colour. Square 1024 master; we
  rasterise this for every Android density via build-icons.sh.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7C5BC2"/>
      <stop offset="1" stop-color="#4F3A87"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed background; Android adaptive icon foreground/background
       layers each cover the full 1024x1024 area, so this stays square. -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Stylised eighth note: head + stem + flag.
       Positioned slightly left-of-centre to leave room for the wave. -->
  <g transform="translate(280 220)">
    <!-- Stem -->
    <rect x="296" y="20" width="40" height="430" rx="14" fill="#FFFFFF"/>
    <!-- Flag — single curl, sweeping right to give a sense of motion -->
    <path d="M336 30 C 470 100 510 220 420 320 C 480 220 440 130 336 130 Z"
          fill="#FFFFFF"/>
    <!-- Note head -->
    <ellipse cx="220" cy="440" rx="120" ry="80" fill="#FFFFFF" transform="rotate(-22 220 440)"/>
  </g>

  <!-- Sound wave under the note: hints at "streaming". -->
  <path d="M 140 800
           Q 270 720 400 800
           T 660 800
           T 900 800"
        fill="none" stroke="#FFFFFF" stroke-width="36"
        stroke-linecap="round" opacity="0.85"/>
</svg>
