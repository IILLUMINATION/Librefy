# Configuration for flutter gen-l10n.
# arb-dir holds the source-of-truth translation files (one per locale).
# The generated AppLocalizations class is shipped into .dart_tool/flutter_gen
# automatically because `flutter: generate: true` is set in pubspec.yaml.
arb-dir: lib/l10n
template-arb-file: app_en.arb
output-localization-file: app_localizations.dart
output-class: AppLocalizations
preferred-supported-locales: ["en", "ru"]
