name: librefy
description: "Librefy — privacy-first, libre/free music streaming with peer-assisted delivery."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  # State management — Riverpod (no code-gen in MVP, hand-written providers).
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.0

  # Networking
  dio: ^5.5.0

  # Audio — media_kit is used directly (cross-platform: Android, iOS,
  # Linux, Windows, macOS). It ships its own libmpv binaries via
  # media_kit_libs_*, so end-users do NOT need to apt-install anything.
  # Background playback / lock-screen controls (Android) come in v0.2
  # via audio_service; out of MVP scope here.
  media_kit: ^1.1.11
  media_kit_libs_audio: ^1.0.5            # picks the right libs per platform

  # FFI for the native libtorrent bridge.
  ffi: ^2.1.3

  # Filesystem
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2

  # UI / utilities
  cached_network_image: ^3.4.0
  google_fonts: ^6.2.1
  dynamic_color: ^1.7.0  # MD3 dynamic color on Android 12+
  flutter_svg: ^2.0.10+1
  crypto: ^3.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true
  # We must declare at least one asset, otherwise Flutter doesn't
  # generate AssetManifest.bin and google_fonts crashes on startup
  # trying to read it. The README placeholder keeps the manifest alive
  # until we have real assets to bundle.
  assets:
    - assets/README.md
